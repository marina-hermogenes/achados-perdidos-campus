{% extends 'base.html' %}
{% block conteudo %}

<style>

.login-page{
    min-height:75vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:32px;
    padding:45px;
    box-shadow:
    0 20px 60px rgba(109,40,217,.12);
}

.login-badge{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    background:rgba(109,40,217,.08);
    color:#6D28D9;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:20px;
}

.login-title{
    font-size:2rem;
    font-weight:800;
    color:#1F2937;
    margin-bottom:10px;
}

.login-subtitle{
    color:#6B7280;
    margin-bottom:30px;
}

.login-card label{
    font-weight:600;
    margin-bottom:6px;
}

.login-card input{
    width:100%;
    border:1px solid #E5E7EB;
    border-radius:14px;
    padding:12px 16px;
    margin-bottom:16px;
    transition:.2s;
}

.login-card input:focus{
    outline:none;
    border-color:#8B5CF6;
    box-shadow:
    0 0 0 4px rgba(139,92,246,.15);
}

.btn-login{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    font-weight:700;
    background:
    linear-gradient(
        135deg,
        #6D28D9,
        #8B5CF6
    );
    color:white;
    transition:.3s;
}

.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:
    0 10px 25px rgba(109,40,217,.25);
}

.register-link{
    text-align:center;
    margin-top:25px;
    color:#6B7280;
}

.register-link a{
    color:#6D28D9;
    font-weight:600;
    text-decoration:none;
}

</style>

<div class="login-page">
    <div class="login-card">
        <div class="login-badge">
            Plataforma UFLA
        </div>
        <h1 class="login-title">
            Entrar
        </h1>
        <p class="login-subtitle">
            Acesse sua conta para gerenciar itens perdidos e encontrados.
        </p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-login">
                Entrar
            </button>
        </form>
        <div class="register-link">
            Não possui conta?
            <a href="/cadastro/">
                Cadastre-se
            </a>
        </div>
    </div>
</div>
{% endblock %}
