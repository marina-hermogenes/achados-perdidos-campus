{% extends 'base.html' %}
{% block conteudo %}

<style>
.register-page{
    min-height:75vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.register-card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:32px;
    padding:45px;
    box-shadow:
    0 20px 60px rgba(109,40,217,.12);
}

.register-badge{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    background:rgba(109,40,217,.08);
    color:#6D28D9;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:20px;
}

.register-title{
    font-size:2rem;
    font-weight:800;
    color:#1F2937;
    margin-bottom:10px;
}

.register-subtitle{
    color:#6B7280;
    margin-bottom:30px;
}

.register-card label{
    font-weight:600;
    margin-bottom:6px;
    color:#374151;
}

.register-card input{
    width:100%;
    border:1px solid #E5E7EB;
    border-radius:14px;
    padding:12px 16px;
    margin-bottom:16px;
    transition:.2s;
}

.register-card input:focus{
    outline:none;
    border-color:#8B5CF6;
    box-shadow:
    0 0 0 4px rgba(139,92,246,.15);
}

.btn-register{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    font-weight:700;
    background:
    linear-gradient(
        135deg,
        #6D28D9,
        #8B5CF6
    );
    color:white;
    transition:.3s;
}

.btn-register:hover{

    transform:translateY(-2px);
    box-shadow:
    0 10px 25px rgba(109,40,217,.25);
}

.login-link{
    text-align:center;
    margin-top:25px;
    color:#6B7280;
}

.login-link a{
    color:#6D28D9;
    text-decoration:none;
    font-weight:600;
}

.help-text{
    font-size:.85rem;
    color:#6B7280;
    margin-top:-10px;
    margin-bottom:15px;
}
.errorlist{
    list-style:none;
    padding:0;
    margin-bottom:15px;
    color:#DC2626;
    font-size:.9rem;
}
</style>
<div class="register-page">
    <div class="register-card">
        <div class="register-badge">
            Plataforma UFLA
        </div>
        <h1 class="register-title">
            Criar Conta
        </h1>
        <p class="register-subtitle">
            Cadastre-se para registrar e localizar itens perdidos ou encontrados.
        </p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-register">
                Criar Conta
            </button>
        </form>
        <div class="login-link">
            Já possui conta?
            <a href="/login/">
                Entrar
            </a>
        </div>
    </div>
</div>
{% endblock %}
